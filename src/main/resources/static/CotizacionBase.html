<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cotizacion Base</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f6f7f9;
            --panel: #ffffff;
            --line: #d8dee8;
            --text: #1f2933;
            --muted: #52616f;
            --accent: #1f7a5c;
            --accent-dark: #155c45;
            --danger: #b42318;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: Arial, sans-serif;
        }

        header,
        main {
            width: min(1120px, calc(100% - 32px));
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            align-items: center;
            padding: 24px 0 12px;
        }

        h1,
        h2,
        h3,
        p {
            margin: 0;
        }

        h1 {
            font-size: 28px;
            line-height: 1.2;
        }

        h2 {
            font-size: 18px;
            margin-bottom: 14px;
        }

        form {
            display: grid;
            gap: 16px;
            margin: 16px 0 28px;
        }

        fieldset,
        .resultado {
            border: 1px solid var(--line);
            background: var(--panel);
            border-radius: 6px;
            padding: 18px;
        }

        fieldset[hidden],
        .resultado[hidden] {
            display: none;
        }

        legend {
            padding: 0 8px;
            font-weight: 700;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 14px;
        }

        label {
            display: grid;
            gap: 6px;
            color: var(--muted);
            font-size: 14px;
        }

        input,
        select {
            width: 100%;
            min-height: 38px;
            border: 1px solid var(--line);
            border-radius: 4px;
            padding: 8px 10px;
            color: var(--text);
            font: inherit;
            background: #fff;
        }

        .checks {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 12px;
        }

        .checks label {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text);
        }

        .checks input {
            width: 18px;
            min-height: 18px;
        }

        .acciones {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        button {
            min-height: 40px;
            border: 1px solid transparent;
            border-radius: 4px;
            padding: 9px 14px;
            font: inherit;
            cursor: pointer;
        }

        button[type="submit"] {
            background: var(--accent);
            color: #fff;
        }

        button[type="submit"]:hover {
            background: var(--accent-dark);
        }

        .boton-secundario {
            border-color: var(--line);
            background: #fff;
            color: var(--text);
        }

        .mensaje {
            min-height: 22px;
            color: var(--muted);
        }

        .mensaje.error {
            color: var(--danger);
        }

        .totales {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 12px;
            margin: 16px 0;
        }

        .total {
            border: 1px solid var(--line);
            border-radius: 6px;
            padding: 12px;
            background: #fbfcfd;
        }

        .total span {
            display: block;
            color: var(--muted);
            font-size: 13px;
        }

        .total strong {
            display: block;
            margin-top: 4px;
            font-size: 18px;
        }

        .tabla-wrap {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 760px;
        }

        th,
        td {
            border-bottom: 1px solid var(--line);
            padding: 10px;
            text-align: left;
            vertical-align: top;
        }

        th {
            color: var(--muted);
            font-size: 13px;
        }

        @media (max-width: 780px) {
            header,
            main {
                width: min(100% - 20px, 1120px);
            }

            header,
            .acciones {
                align-items: stretch;
                flex-direction: column;
            }

            .grid,
            .checks,
            .totales {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header>
        <div>
            <h1>Cotizacion base</h1>
            <p id="nombreProyecto" class="mensaje"></p>
        </div>
        <button class="boton-secundario" type="button" onclick="cerrarSesion()">Cerrar sesion</button>
    </header>

    <main>
        <form id="formCotizar">
            <fieldset id="seccionManoObra" data-servicio="1" hidden>
                <legend>Obra blanca</legend>
                <div class="grid">
                    <label>Area privada (m2)
                        <input type="number" id="manoAreaPrivada" min="1" step="0.01">
                    </label>
                    <label>Cantidad de banos
                        <input type="number" id="manoCantidadBanos" min="1" step="1">
                    </label>
                    <label>Division de pared
                        <select id="manoDivisionPared">
                            <option value="true">Si</option>
                            <option value="false">No</option>
                        </select>
                    </label>
                    <label>Tipo de cielo
                        <select id="manoTipoCielo">
                            <option value="DRYWALL">Drywall</option>
                            <option value="ESTUCO">Estuco</option>
                        </select>
                    </label>
                    <label>M2 panel yeso
                        <input type="number" id="manoM2PanelYeso" min="0" step="0.01">
                    </label>
                    <label>Cantidad de poyos
                        <input type="number" id="manoCantidadPoyos" min="0" step="1">
                    </label>
                    <label>Puntos electricos
                        <input type="number" id="manoPuntosElectricos" min="0" step="1">
                    </label>
                    <label>M2 muro
                        <input type="number" id="manoM2Muro" min="0" step="0.01">
                    </label>
                    <label>M2 cielo
                        <input type="number" id="manoM2Cielo" min="0" step="0.01">
                    </label>
                    <label>M2 tapar tuberias
                        <input type="number" id="manoM2Tuberias" min="0" step="0.01">
                    </label>
                </div>
            </fieldset>

            <fieldset id="seccionCarpinteria" data-servicio="2" hidden>
                <legend>Carpinteria</legend>
                <div class="grid">
                    <label>Closets
                        <input type="number" id="carpCloset" min="0" step="1">
                    </label>
                    <label>Puertas
                        <input type="number" id="carpPuertas" min="0" step="1">
                    </label>
                    <label>Mueble alto cocina
                        <input type="number" id="carpMuebleAltoCocina" min="0" step="0.01">
                    </label>
                    <label>Mueble bajo cocina
                        <input type="number" id="carpMuebleBajoCocina" min="0" step="0.01">
                    </label>
                    <label>Banos con muebles
                        <input type="number" id="carpCantidadBanos" min="0" step="1">
                    </label>
                    <label>Muebles bajos de bano
                        <input type="number" id="carpMuebleBajoBano" min="0" step="1">
                    </label>
                    <label>Muebles altos de bano
                        <input type="number" id="carpMuebleAltoBano" min="0" step="1">
                    </label>
                </div>
            </fieldset>

            <fieldset id="seccionVidrio" data-servicio="3" hidden>
                <legend>Divisiones en vidrio</legend>
                <div class="grid">
                    <label>Cantidad de banos
                        <input type="number" id="vidrioCantidadBanos" min="1" step="1">
                    </label>
                    <label>Tipo de apertura
                        <select id="vidrioTipoApertura">
                            <option value="CORREDIZA">Corrediza</option>
                            <option value="BATIENTE">Batiente</option>
                        </select>
                    </label>
                    <label>Color de accesorios
                        <select id="vidrioColorAccesorios">
                            <option value="NEGROS">Negros</option>
                            <option value="PLATEADOS">Plateados</option>
                        </select>
                    </label>
                </div>
            </fieldset>

            <fieldset id="seccionMezon" data-servicio="4" hidden>
                <legend>Mesones en marmol</legend>
                <div class="checks">
                    <label><input type="checkbox" id="mezonCocina"> Meson de cocina</label>
                    <label><input type="checkbox" id="mezonBarra"> Meson barra</label>
                    <label><input type="checkbox" id="mezonLavamanos"> Meson lavamanos</label>
                </div>
            </fieldset>

            <p id="mensaje" class="mensaje"></p>

            <div class="acciones">
                <button class="boton-secundario" type="button" id="btnVolver">Volver</button>
                <button type="submit">Generar cotizacion</button>
            </div>
        </form>

        <section id="resultado" class="resultado" hidden>
            <h2>Resultado</h2>
            <div class="totales">
                <div class="total"><span>Mano de obra</span><strong id="totalManoObra">$0</strong></div>
                <div class="total"><span>Materiales</span><strong id="totalMateriales">$0</strong></div>
                <div class="total"><span>Productos</span><strong id="totalProductos">$0</strong></div>
                <div class="total"><span>Total</span><strong id="totalEstimado">$0</strong></div>
            </div>
            <div class="tabla-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>Servicio</th>
                            <th>Tipo</th>
                            <th>Descripcion</th>
                            <th>Cantidad</th>
                            <th>Valor unitario</th>
                            <th>Subtotal</th>
                        </tr>
                    </thead>
                    <tbody id="tablaCotizacion"></tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="js/CotizacionBase.js"></script>
</body>
</html>
